[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI-Idiom: File(...)/Depends(...) in Argument-Defaults ist gewollt.
extend-immutable-calls = ["fastapi.File", "fastapi.Depends"]
